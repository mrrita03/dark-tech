<div class="page">
  <div class="auth-card">
    <h2>Cadastro</h2>
    <p class="muted">Crie sua conta para acessar o carrinho e finalizar.</p>

    <form (ngSubmit)="cadastrar()">
      <label>
        Nome
        <input name="nome" type="text" [(ngModel)]="nome" required />
      </label>

      <label>
        Email
        <input name="email" type="email" [(ngModel)]="email" required />
      </label>

      <label>
        Senha
        <input name="senha" type="password" [(ngModel)]="senha" required minlength="4" />
      </label>

      <div class="error" *ngIf="erro">{{ erro }}</div>

      <button type="submit" class="btn">Criar conta</button>
    </form>

    <div class="links">
      <a routerLink="/login">Já tenho conta</a>
      <span class="dot">•</span>
      <a routerLink="/">Voltar</a>
    </div>
  </div>
</div>
