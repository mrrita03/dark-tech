<div class="page">
  <div class="auth-card">
    <h2>🔑 Resetar Senha</h2>
    <p class="muted">Digite seu email e a nova senha.</p>

    <label>
      Email
      <input type="email" [(ngModel)]="email" placeholder="seu@email.com" />
    </label>

    <label>
      Nova Senha
      <input type="password" [(ngModel)]="novaSenha" placeholder="Mínimo 4 caracteres" />
    </label>

    <div class="error" *ngIf="erro">{{ erro }}</div>
    <div class="success" *ngIf="sucesso">{{ sucesso }}</div>

    <button class="btn" (click)="resetar()">Atualizar Senha</button>

    <div class="links">
      <a routerLink="/login">Voltar ao Login</a>
    </div>
  </div>
</div>
